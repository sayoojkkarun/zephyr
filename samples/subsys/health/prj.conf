# Health Monitor Sample Configuration

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Enable shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Enable health monitor subsystem
CONFIG_HEALTH_MONITOR=y
CONFIG_HEALTH_MONITOR_UPDATE_INTERVAL_MS=1000

# Enable all built-in metrics
CONFIG_HEALTH_MONITOR_CPU=y
CONFIG_HEALTH_MONITOR_MEMORY=y
CONFIG_HEALTH_MONITOR_STACK=y
CONFIG_HEALTH_MONITOR_THREADS=y

# Enable custom metrics
CONFIG_HEALTH_MONITOR_CUSTOM_METRICS=y
CONFIG_HEALTH_MONITOR_MAX_CUSTOM_METRICS=8

# Enable shell commands
CONFIG_HEALTH_MONITOR_SHELL=y

# Enable default thresholds
CONFIG_HEALTH_MONITOR_DEFAULT_THRESHOLDS=y

# Optional: Enable history tracking
# CONFIG_HEALTH_MONITOR_HISTORY=y
# CONFIG_HEALTH_MONITOR_HISTORY_SIZE=10

# Dependencies for built-in metrics
CONFIG_STATS=y
CONFIG_THREAD_ANALYZER=y

# Enable thread names for better debugging
CONFIG_THREAD_NAME=y

# Health monitor log level
CONFIG_HEALTH_MONITOR_LOG_LEVEL_DBG=y

